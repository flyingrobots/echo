[package]
name = "warp-cli"
version = "0.1.0"
edition = "2021"
rust-version = "1.90.0"
description = "Echo developer CLI: verify, bench, inspect"
license = "Apache-2.0"
repository = "https://github.com/flyingrobots/echo"
readme = "README.md"
keywords = ["echo", "cli", "ecs"]
categories = ["command-line-utilities"]

[[bin]]
name = "echo-cli"
path = "src/main.rs"

[dependencies]
anyhow = "1"
bytes = "1"
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
hex = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
warp-core = { workspace = true }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"


[lints]
workspace = true
