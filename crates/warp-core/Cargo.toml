[package]
name = "warp-core"
version = "0.1.1"
edition = "2021"
rust-version = "1.90.0"
description = "Echo core: deterministic typed graph rewriting engine"
license = "Apache-2.0"
repository = "https://github.com/flyingrobots/echo"
readme = "README.md"
keywords = ["echo", "ecs", "deterministic", "graph"]
categories = ["game-engines", "data-structures"]
build = "build.rs"

[dependencies]
blake3 = "1.0"
bytemuck = { version = "1.14", features = ["derive", "extern_crate_std"] }
bytes = "1.0"
thiserror = "1.0"
hex = "0.4"
rustc-hash = "2.1.1"
echo-wasm-abi = { workspace = true }
echo-runtime-schema = { workspace = true }
echo-registry-api = { workspace = true }
echo-edict-canonical = { workspace = true }
warp-math = { workspace = true }

[dev-dependencies]
proptest = { version = "1.5" }
echo-dry-tests = { workspace = true }
echo-cas = { workspace = true }

[features]
default = []
# INTERNAL ONLY: exposes native Rust rule authoring seams for Echo's own
# bootstrap fixtures, tests, and benchmarks. This is not the public authoring
# path for application rewrites.
native_rule_bootstrap = []
# INTERNAL ONLY: exposes host/test fixture seams for Echo-owned admission
# evidence. Downstream application crates must not enable this feature.
host_test = []
# TRUSTED HOST ONLY: exposes runtime-owner authority constructors for host
# adapters that own scheduler/runtime control. Application crates must not
# enable this feature.
trusted_runtime = []

# Scalar backend lanes (CI/test orchestration).
# - `det_float`: default float32-backed lane using `F32Scalar`.
# - `det_fixed`: fixed-point Q32.32 lane using `DFix64` (experimental, test-only).
det_float = ["warp-math/det_float"]
det_fixed = ["warp-math/det_fixed"]

# Validation feature for delta operations
delta_validate = []

# Enable footprint enforcement in release builds (normally debug-only).
# Use in CI or staging to catch footprint violations before production.
# Mutually exclusive with `unsafe_graph` (compile error if both enabled).
footprint_enforce_release = []

# DANGER: Disables footprint enforcement entirely, even in debug builds.
# Only use if you've proven enforcement overhead is unacceptable in a
# specific hot path. Removes all determinism safety checks.
# Mutually exclusive with `footprint_enforce_release`.
unsafe_graph = []

[[test]]
name = "parallel_parallel_exec"
required-features = ["delta_validate"]

[[test]]
name = "causal_fact_publication_tests"
required-features = ["host_test"]

[[test]]
name = "optic_invocation_admission_tests"
required-features = ["host_test"]

[[test]]
name = "scheduler_fault_recovery_authority"
required-features = ["trusted_runtime"]

[[test]]
name = "installed_contract_registry_tests"
required-features = ["native_rule_bootstrap"]

[[test]]
name = "installed_contract_intent_pipeline_tests"
required-features = ["native_rule_bootstrap", "host_test"]

[[test]]
name = "provider_contract_admission_tests"
required-features = ["native_rule_bootstrap", "trusted_runtime"]

[[test]]
name = "executable_operation_pipeline_tests"
required-features = ["native_rule_bootstrap", "trusted_runtime", "host_test"]

[build-dependencies]
blake3 = "1.0"

[lints]
workspace = true
